{{- range $name, $c := .Values.components }}
{{- if $c.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: reveal-ai-{{ $name }}
  labels:
    app: reveal-ai
    component: {{ $name }}
spec:
  selector:
    app: reveal-ai
    component: {{ $name }}
  ports:
  - name: http
    port: {{ $c.port }}
    targetPort: http
{{- end }}
{{- end }}
