apiVersion: apps/v1
kind: Deployment
metadata:
  name: reveal-ai
  labels:
    app: reveal-ai
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: reveal-ai
  template:
    metadata:
      labels:
        app: reveal-ai
        reveal-ai/env: {{ .Values.env | quote }}
        reveal-ai/chart-version: {{ .Chart.Version | quote }}
    spec:
      containers:
      - name: reveal-ai
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 9898
        env:
        # Makes the running version + env obvious in the podinfo UI and /env endpoint.
        - name: PODINFO_UI_MESSAGE
          value: "{{ .Values.message }} | chart {{ .Chart.Version }} | env {{ .Values.env }}"
        livenessProbe:
          httpGet: { path: /healthz, port: http }
          initialDelaySeconds: 5
        readinessProbe:
          httpGet: { path: /readyz, port: http }
          initialDelaySeconds: 5
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
