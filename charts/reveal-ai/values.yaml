# Multi-component reveal-ai stand-in. Each component is its own image+tag,
# mirroring real reveal-ai (ai_service, frontend, automation, ...).
# Env-specific tags come from envs/<env>/<region>/values/reveal-ai.yaml.
replicaCount: 1
env: "unknown"
message: "reveal-ai"

components:
  ai-service:
    image:
      repository: ghcr.io/stefanprodan/podinfo
      tag: "6.7.1"
    port: 9898          # exposes a Service so health/verification can probe it
  frontend:
    image:
      repository: public.ecr.aws/nginx/nginx
      tag: "1.27.0"
  automation:
    image:
      repository: public.ecr.aws/docker/library/redis
      tag: "7.2.0"

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 96Mi
