# dev -> uat -> prod, all git-only (VISIBILITY model: bump tags in git, each region's
# own Argo CD syncs). dev ALSO layers the CONTROL model on top (without removing git-only):
#   - an argocd-update step so Kargo drives the dev Argo CD sync, and
#   - spec.verification so freight is only Verified after a real /healthz check passes.
# uat/prod remain pure git-only for side-by-side comparison.
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: reveal-ai-poc
spec:
  requestedFreight:
  - origin: { kind: Warehouse, name: reveal-ai }
    sources: { direct: true }
  # CONTROL model: gate dev on a real post-deploy health check.
  verification:
    analysisTemplates:
    - name: dev-smoke
  promotionTemplate:
    spec:
      vars:
      - { name: gitopsRepo, value: https://github.com/redreveal/kargo-poc.git }
      - { name: valuesPath, value: envs/dev/us-east-1/values/reveal-ai.yaml }
      steps:
      - uses: git-clone
        config:
          repoURL: ${{ vars.gitopsRepo }}
          checkout:
          - { branch: main, path: ./repo }
      - uses: yaml-update
        as: update
        config:
          path: ./repo/${{ vars.valuesPath }}
          updates:
          - { key: components.ai-service.image.tag, value: "${{ imageFrom('ghcr.io/stefanprodan/podinfo').Tag }}" }
          - { key: components.frontend.image.tag,   value: "${{ imageFrom('public.ecr.aws/nginx/nginx').Tag }}" }
          - { key: components.automation.image.tag, value: "${{ imageFrom('public.ecr.aws/docker/library/redis').Tag }}" }
      - uses: git-commit
        config:
          path: ./repo
          message: "kargo: promote reveal-ai components to ${{ ctx.stage }}"
      - uses: git-push
        config:
          path: ./repo
      # CONTROL model: Kargo drives the dev Argo CD sync (and registers a health check).
      # dev's Argo CD is on the hub cluster, so no agent is needed.
      - uses: argocd-update
        config:
          apps:
          - name: reveal-ai
            namespace: argocd
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: uat
  namespace: reveal-ai-poc
spec:
  requestedFreight:
  - origin: { kind: Warehouse, name: reveal-ai }
    sources: { stages: [dev] }
  promotionTemplate:
    spec:
      vars:
      - { name: gitopsRepo, value: https://github.com/redreveal/kargo-poc.git }
      - { name: valuesPath, value: envs/uat/eu-west-1/values/reveal-ai.yaml }
      steps:
      - uses: git-clone
        config:
          repoURL: ${{ vars.gitopsRepo }}
          checkout:
          - { branch: main, path: ./repo }
      - uses: yaml-update
        as: update
        config:
          path: ./repo/${{ vars.valuesPath }}
          updates:
          - { key: components.ai-service.image.tag, value: "${{ imageFrom('ghcr.io/stefanprodan/podinfo').Tag }}" }
          - { key: components.frontend.image.tag,   value: "${{ imageFrom('public.ecr.aws/nginx/nginx').Tag }}" }
          - { key: components.automation.image.tag, value: "${{ imageFrom('public.ecr.aws/docker/library/redis').Tag }}" }
      - uses: git-commit
        config:
          path: ./repo
          message: "kargo: promote reveal-ai components to ${{ ctx.stage }}"
      - uses: git-push
        config:
          path: ./repo
---
