apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: reveal-ai
  namespace: argocd
  annotations:
    # Authorizes the Kargo dev Stage to drive/sync this Application (CONTROL model).
    kargo.akuity.io/authorized-stage: reveal-ai-poc:dev
spec:
  project: default
  sources:
  - repoURL: https://github.com/redreveal/kargo-poc.git
    targetRevision: HEAD
    path: charts/reveal-ai
    helm:
      releaseName: reveal-ai
      valueFiles:
      - $values/base/reveal-ai.yaml
      - $values/envs/dev/us-east-1/values/reveal-ai.yaml
  - repoURL: https://github.com/redreveal/kargo-poc.git
    targetRevision: HEAD
    ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: reveal-ai
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
